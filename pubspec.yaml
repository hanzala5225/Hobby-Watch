name: hobbywatch
description: Sports card profit alert app — track your collection and get notified when it's time to sell.
version: 1.0.0+2
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  get: ^4.6.6

  # UI & fonts
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0

  # Storage & networking
  shared_preferences: ^2.2.3
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Permissions & device
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.2
  flutter_local_notifications: ^17.1.2

  # OCR — Google ML Kit
  google_mlkit_text_recognition: ^0.15.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/HobbyWatch_logo.png"
  remove_alpha_ios: true