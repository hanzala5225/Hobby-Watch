workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        APP_STORE_CONNECT_ISSUER_ID: "082c19f7-97ae-4c13-9c15-47a3c7e425ea"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "92L2F9K854"
        BUNDLE_ID: "com.hobbywatch.app"
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Pod install
        script: cd ios && pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Delete existing certificates
        script: |
          app-store-connect certificates list \
            --type DISTRIBUTION \
            --json | \
          python3 -c "
          import sys, json
          data = sys.stdin.read()
          certs = json.loads(data)
          for c in certs:
              print(c['id'])
          " | while read cert_id; do
            echo "Deleting certificate: $cert_id"
            app-store-connect certificates delete "$cert_id" || true
          done
          echo "Done"
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY"
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Install profile and patch project
        script: |
          python3 << 'PYEOF'
          import os, re, plistlib, shutil

          # Find profile
          profile_dir = os.path.expanduser("~/Library/Developer/Xcode/UserData/Provisioning Profiles")
          profiles = [f for f in os.listdir(profile_dir) if f.endswith(".mobileprovision")]
          profile_path = os.path.join(profile_dir, profiles[0])
          print(f"Profile: {profile_path}")

          # Parse profile
          with open(profile_path, "rb") as f:
              content = f.read()
          start = content.find(b"<?xml")
          end = content.find(b"</plist>") + 8
          plist = plistlib.loads(content[start:end])
          uuid = plist["UUID"]
          name = plist["Name"]
          print(f"UUID: {uuid}")
          print(f"Name: {name}")

          # Install with UUID filename
          mobile_dir = os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles")
          os.makedirs(mobile_dir, exist_ok=True)
          dest = os.path.join(mobile_dir, f"{uuid}.mobileprovision")
          shutil.copy2(profile_path, dest)
          dest2 = os.path.join(profile_dir, f"{uuid}.mobileprovision")
          shutil.copy2(profile_path, dest2)
          print(f"Installed to: {dest}")
          print(f"Installed to: {dest2}")

          # Patch project.pbxproj
          pbxproj = "ios/Runner.xcodeproj/project.pbxproj"
          with open(pbxproj, "r") as f:
              proj = f.read()

          # Remove old specifiers
          proj = re.sub(r'\t+PROVISIONING_PROFILE = ".*?";\n', "", proj)
          proj = re.sub(r'\t+PROVISIONING_PROFILE_SPECIFIER = ".*?";\n', "", proj)

          # Inject into Release Runner target (97C147071CF9000F007C117D)
          target = '97C147071CF9000F007C117D /* Release */'
          idx = proj.find(target)
          if idx >= 0:
              # Find buildSettings block
              bs_idx = proj.find("buildSettings = {", idx)
              end_idx = proj.find("};", bs_idx)
              insert_pos = end_idx
              inject = f'\t\t\t\tPROVISIONING_PROFILE = "{uuid}";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{name}";\n'
              proj = proj[:insert_pos] + inject + proj[insert_pos:]
              print(f"Injected profile into Release target")

          with open(pbxproj, "w") as f:
              f.write(proj)

          # Write ExportOptions
          export_options = f"""<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>46CH6J94CY</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.hobbywatch.app</key>
                  <string>{name}</string>
              </dict>
          </dict>
          </plist>"""
          with open("/tmp/ExportOptions.plist", "w") as f:
              f.write(export_options)
          print("ExportOptions written")
          print(f"Profile name in ExportOptions: {name}")
          PYEOF
      - name: Build IPA
        script: |
          cat /tmp/ExportOptions.plist
          flutter build ipa --release \
            --export-options-plist /tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true