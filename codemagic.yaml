workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        APP_STORE_CONNECT_ISSUER_ID: "082c19f7-97ae-4c13-9c15-47a3c7e425ea"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "92L2F9K854"
        BUNDLE_ID: "com.hobbywatch.app"
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Pod install
        script: cd ios && pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Delete existing certificates
        script: |
          app-store-connect certificates list \
            --type DISTRIBUTION \
            --json | \
          python3 -c "
          import sys, json
          data = sys.stdin.read()
          certs = json.loads(data)
          for c in certs:
              print(c['id'])
          " | while read cert_id; do
            echo "Deleting certificate: $cert_id"
            app-store-connect certificates delete "$cert_id" || true
          done
          echo "Done"
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY"
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings
        script: xcode-project use-profiles
      - name: Get profile name and build IPA
        script: |
          PROFILE_PATH=$(ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "Profile path: $PROFILE_PATH"
          
          PROFILE_NAME=$(python3 -c "
          import plistlib, sys
          with open('$PROFILE_PATH', 'rb') as f:
              content = f.read()
          start = content.find(b'<?xml')
          end = content.find(b'</plist>') + 8
          plist = plistlib.loads(content[start:end])
          print(plist.get('Name', ''))
          ")
          echo "Profile name: $PROFILE_NAME"

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>46CH6J94CY</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.hobbywatch.app</key>
                  <string>$PROFILE_NAME</string>
              </dict>
          </dict>
          </plist>
          PLIST

          # Set manual signing in project
          ruby -e "
          content = File.read('ios/Runner.xcodeproj/project.pbxproj')
          content.gsub!('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          File.write('ios/Runner.xcodeproj/project.pbxproj', content)
          "

          flutter build ipa --release \
            --export-options-plist /tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true