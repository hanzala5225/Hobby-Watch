workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        APP_STORE_CONNECT_ISSUER_ID: "082c19f7-97ae-4c13-9c15-47a3c7e425ea"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "92L2F9K854"
        BUNDLE_ID: "com.hobbywatch.app"
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Pod install
        script: cd ios && pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Delete existing certificates
        script: |
          app-store-connect certificates list \
            --type DISTRIBUTION \
            --json | \
          python3 -c "
          import sys, json
          data = sys.stdin.read()
          certs = json.loads(data)
          for c in certs:
              print(c['id'])
          " | while read cert_id; do
            echo "Revoking certificate: $cert_id"
            app-store-connect certificates revoke "$cert_id" || true
          done
          echo "Done revoking certificates"
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY"
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true