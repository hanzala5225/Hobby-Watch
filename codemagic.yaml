workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_credentials
      vars:
        APP_STORE_CONNECT_ISSUER_ID: "082c19f7-97ae-4c13-9c15-47a3c7e425ea"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "92L2F9K854"
        BUNDLE_ID: "com.hobbywatch.app"
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Pod install
        script: cd ios && pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Delete existing certificates
        script: |
          app-store-connect certificates list \
            --type DISTRIBUTION \
            --json | \
          python3 -c "
          import sys, json
          data = sys.stdin.read()
          certs = json.loads(data)
          for c in certs:
              print(c['id'])
          " | while read cert_id; do
            echo "Deleting certificate: $cert_id"
            app-store-connect certificates delete "$cert_id" || true
          done
          echo "Done"
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY"
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Install provisioning profile
        script: |
          PROFILE_PATH=$(ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/*.mobileprovision | head -1)
          echo "Source profile: $PROFILE_PATH"

          UUID=$(python3 -c "
          import plistlib
          with open('$PROFILE_PATH', 'rb') as f:
              content = f.read()
          start = content.find(b'<?xml')
          end = content.find(b'</plist>') + 8
          plist = plistlib.loads(content[start:end])
          print(plist.get('UUID', ''))
          ")
          echo "UUID: $UUID"

          PROFILE_NAME=$(python3 -c "
          import plistlib
          with open('$PROFILE_PATH', 'rb') as f:
              content = f.read()
          start = content.find(b'<?xml')
          end = content.find(b'</plist>') + 8
          plist = plistlib.loads(content[start:end])
          print(plist.get('Name', ''))
          ")
          echo "Profile name: $PROFILE_NAME"

          # Install to BOTH locations with UUID filename
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          cp "$PROFILE_PATH" ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/${UUID}.mobileprovision

          echo "Installed profiles:"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/
          ls ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/

          # Save for next step
          echo "$PROFILE_NAME" > /tmp/profile_name.txt
          echo "$UUID" > /tmp/profile_uuid.txt
      - name: Build IPA
        script: |
          PROFILE_NAME=$(cat /tmp/profile_name.txt)
          UUID=$(cat /tmp/profile_uuid.txt)
          echo "Using profile: $PROFILE_NAME ($UUID)"

          # Inject into pbxproj
          python3 << PYEOF
          import re
          with open('ios/Runner.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          # Remove any existing PROVISIONING_PROFILE_SPECIFIER
          content = re.sub(r'\t+PROVISIONING_PROFILE_SPECIFIER = ".*?";\n', '', content)
          # Add to Release Runner target
          content = content.replace(
              '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tCURRENT_PROJECT_VERSION',
              '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE = "$(PROFILE_NAME)";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "$(PROFILE_NAME)";\n\t\t\t\tCURRENT_PROJECT_VERSION'
          )
          with open('ios/Runner.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print('Done patching pbxproj')
          PYEOF

          # Patch with actual values
          sed -i "" "s/\$(PROFILE_NAME)/$PROFILE_NAME/g" ios/Runner.xcodeproj/project.pbxproj

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>46CH6J94CY</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.hobbywatch.app</key>
                  <string>$PROFILE_NAME</string>
              </dict>
          </dict>
          </plist>
          PLIST

          flutter build ipa --release \
            --export-options-plist /tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true